// ─── STORAGE ──────────────────────────────────────────────────────────────────
function useStorage() {
  const KEY = "copa2026_v4";
  const [coladas, setColadas] = useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem(KEY)||"[]")); } catch { return new Set(); }
  });
  const [repetidas, setRepetidas] = useState(() => {
    try { return JSON.parse(localStorage.getItem(KEY+"_rep")||"{}"); } catch { return {}; }
  });
  const save = useCallback((c,r) => {
    localStorage.setItem(KEY, JSON.stringify([...c]));
    localStorage.setItem(KEY+"_rep", JSON.stringify(r));
  },[]);
  const toggle = useCallback((key) => {
    setColadas(prev => { const n=new Set(prev); n.has(key)?n.delete(key):n.add(key); save(n,repetidas); return n; });
  },[repetidas,save]);
  const setRep = useCallback((key,val) => {
    setRepetidas(prev => { const n={...prev}; if(val<=0)delete n[key];else n[key]=val; save(coladas,n); return n; });
  },[coladas,save]);
  const marcarLote = useCallback((keys,v) => {
    setColadas(prev => { const n=new Set(prev); keys.forEach(k=>v?n.add(k):n.delete(k)); save(n,repetidas); return n; });
  },[repetidas,save]);
  const addRepetida = useCallback((key) => {
    setRepetidas(prev => { const n={...prev,[key]:(prev[key]||0)+1}; save(coladas,n); return n; });
  },[coladas,save]);
  return {coladas,repetidas,toggle,setRep,marcarLote,addRepetida};
}

function loadJsPDF() {
  return new Promise((res, rej) => {
    if (window.jspdf) { res(window.jspdf.jsPDF); return; }
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";

    document.head.appendChild(s);
  });
}
function hexToRgb(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}

  let totC=0; SELECOES.forEach(s=>{for(let i=1;i<=20;i++)if(coladas.has(`${s.id}_${i}`))totC++;});

  doc.setFont("helvetica","bold"); doc.setFontSize(26); sT(C_W);

  doc.setFontSize(13); sT(C_W);
  doc.text("Album Panini — Minhas Figurinhas", PW/2, 73, {align:"center"});

  // Box stats
  const BX=ML+8,BY=82,BW=CW-16,BH=48;
  sF(C_DARK); doc.roundedRect(BX,BY,BW,BH,3,3,"F");
  sD(C_BORD); doc.setLineWidth(0.4); doc.roundedRect(BX,BY,BW,BH,3,3,"S");
  doc.setFont("helvetica","bold"); doc.setFontSize(8); sT(C_DIM);
  doc.text("PROGRESSO GERAL", BX+BW/2, BY+9, {align:"center"});
  doc.setFontSize(30); sT([255,106,0]);
  doc.text(`${pct}%`, BX+BW/2, BY+23, {align:"center"});
  const pbx=BX+8,pby=BY+27,pbw=BW-16,pbh=5;
  sF(C_BORD); doc.roundedRect(pbx,pby,pbw,pbh,2,2,"F");
  sF(C_MAG); doc.roundedRect(pbx,pby,pbw*pct/100,pbh,2,2,"F");
  const c3=(BW-16)/3;
  [["coladas",totC,C_GREEN],["faltando",TOTAL_ALBUM-totC,C_AMBER],["repetidas",totR,[255,106,0]]].forEach((s,i)=>{
    const x=BX+8+i*c3+c3/2;
    doc.setFont("helvetica","bold"); doc.setFontSize(15); sT(s[2]);

  doc.setFont("helvetica","bold"); doc.setFontSize(9); sT([230,0,126]);
  doc.text("PROGRESSO POR GRUPO", ML, gy); gy+=6;
  const GC=4, GW=CW/GC, gk=Object.keys(grupos).sort();
  gk.forEach((g,gi)=>{
    const col=gi%GC,row=Math.floor(gi/GC),gx=ML+col*GW,gry=gy+row*24;
    const ss=grupos[g],tot=ss.length*20;
    const cnt=ss.reduce((a,s)=>{for(let i=1;i<=20;i++)if(coladas.has(`${s.id}_${i}`))a++;return a;},0);
    const gp=Math.round(cnt/tot*100);
    sF(C_DARK); doc.roundedRect(gx,gry,GW-2,22,1.5,1.5,"F");
    sD(C_BORD); doc.setLineWidth(0.2); doc.roundedRect(gx,gry,GW-2,22,1.5,1.5,"S");

  // PAGINAS SELECOES

  let pg=1;
  for(let si=0;si<SELECOES.length;si++){

    doc.setFont("helvetica","bold"); doc.setFontSize(7); sT(pct2===100?C_GREEN:[255,106,0]);
    doc.text(`${cnt}/20`, bx+5, by+12);
    if(rT>0){doc.setFontSize(6); sT(C_AMBER); doc.text(`${rT} rep`, bx+20, by+12);}
    const px=bx+5,py=by+14,pw=BLW-10,ph=2.5;
    sF(C_BORD); doc.roundedRect(px,py,pw,ph,1,1,"F");
    if(pct2>0){sF(pct2===100?C_GREEN:[230,0,126]); doc.roundedRect(px,py,pw*pct2/100,ph,1,1,"F");}
    sF(C_BORD); doc.rect(bx+5,by+19,BLW-10,0.3,"F");

    const FC=4,FW=(BLW-10)/FC,FH=(BLH-25)/5,FX=bx+5,FY=by+21;

      const fc=fi%FC,fr=Math.floor(fi/FC),fx=FX+fc*FW,fy=FY+fr*FH;
      const k=`${sel.id}_${f.num}`,has=coladas.has(k),rep=repetidas[k]||0;
      if(has){sF([14,42,24]); doc.roundedRect(fx,fy,FW-1,FH-1,0.8,0.8,"F"); sD(C_GREEN); doc.setLineWidth(0.2); doc.roundedRect(fx,fy,FW-1,FH-1,0.8,0.8,"S");}

      if(has){doc.setFont("helvetica","bold"); doc.setFontSize(6); sT(C_GREEN); doc.text("ok", fx+FW-4, fy+3.8);}

function CameraModal({modo,onClose,onConfirm,coladas}) {
  const [fase,setFase]=useState("captura");
  const [imgSrc,setImgSrc]=useState(null);
  const [imgFile,setImgFile]=useState(null);
  const [resultado,setResultado]=useState(null);
  const [erro,setErro]=useState(null);
  const fileRef=useRef(),videoRef=useRef();
  const [usarCamera,setUsarCamera]=useState(false);
  const [stream,setStream]=useState(null);
  useEffect(()=>()=>{if(stream)stream.getTracks().forEach(t=>t.stop());},[stream]);

  async function abrirCamera(){
    try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}}});
      setStream(s);setUsarCamera(true);setTimeout(()=>{if(videoRef.current)videoRef.current.srcObject=s;},100);
    }catch{fileRef.current?.click();}
  }
  function capturar(){const v=videoRef.current;if(!v)return;const c=document.createElement("canvas");c.width=v.videoWidth;c.height=v.videoHeight;c.getContext("2d").drawImage(v,0,0);c.toBlob(b=>{setImgFile(new File([b],"c.jpg",{type:"image/jpeg"}));setImgSrc(c.toDataURL("image/jpeg"));stream?.getTracks().forEach(t=>t.stop());setUsarCamera(false);},"image/jpeg",0.85);}
  function selArq(e){const f=e.target.files[0];if(!f)return;setImgFile(f);setImgSrc(URL.createObjectURL(f));}

  async function analisar(){
    if(!imgFile)return; setFase("analisando"); setErro(null);
    try{
      const b64=await imageToBase64(imgFile);

          {resultado.tipo==="pagina"&&(()=>{
            const d=resultado.dados,sel=SEL_BY_ID[d.selecao_id],figs=sel?gerarFigurinhasSel(sel):[];

              <div style={{background:FIFA.bgCard,borderRadius:14,padding:14,marginBottom:14,border:`1px solid ${FIFA.border}`}}>

                <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>

                    return <div key={f.num} style={{background:isC?(ja?"#1A2A1A":"#0F2A14"):FIFA.bg,border:`1.5px solid ${isC?(ja?"#37E27B66":FIFA.green):FIFA.border}`,borderRadius:8,padding:"6px 4px",textAlign:"center"}}>
                      <div style={{fontSize:9,fontWeight:800,color:isC?FIFA.green:FIFA.textDim}}>{f.codigo}</div>

                <button onClick={()=>{setFase("captura");setResultado(null);setImgSrc(null);setImgFile(null);}} style={{background:FIFA.bgCard2,border:`1px solid ${FIFA.border}`,borderRadius:12,color:FIFA.textDim,padding:12,fontSize:13,cursor:"pointer"}}>🔄 Tentar novamente</button>

            const d=resultado.dados,sel=SEL_BY_ID[d.selecao_id],figs=sel?gerarFigurinhasSel(sel):[];
            const fig=figs.find(f=>f.num===d.numero),key=sel?`${sel.id}_${d.numero}`:null,ja=key?coladas.has(key):false;
            return (<div>
              <div style={{background:FIFA.bgCard,borderRadius:14,padding:16,marginBottom:14,border:`1px solid ${FIFA.border}`}}>

              </div>)}
            </div>);
          })()}
        </div>)}
      </div>
    </div>
  );
}

// ─── FIGURINHA CARD ───────────────────────────────────────────────────────────
function FigurinhaCard({fig,coladaKey,coladas,repetidas,toggle,setRep}) {
  const colada=coladas.has(coladaKey),rep=repetidas[coladaKey]||0;
  return (
    <div onClick={()=>toggle(coladaKey)} style={{background:colada?"#0E2A18":FIFA.bg,border:`1.5px solid ${colada?FIFA.green:fig.especial?FIFA.amber+"66":FIFA.border}`,borderRadius:10,padding:"8px 10px",cursor:"pointer",transition:"all 0.15s",position:"relative",opacity:colada?1:0.72,userSelect:"none"}}>
      {fig.especial&&<span style={{position:"absolute",top:4,right:6,fontSize:9,color:FIFA.amber}}>★</span>}
      <div style={{fontSize:10,color:colada?FIFA.green:FIFA.textDim,marginBottom:1,fontWeight:700}}>{fig.codigo}</div>
      <div style={{fontSize:11,color:colada?"#B0FFC8":FIFA.text,fontWeight:600,lineHeight:1.2}}>{colada?"✓ ":""}{fig.label}</div>
      {colada&&(<div onClick={e=>e.stopPropagation()} style={{marginTop:6,display:"flex",alignItems:"center",gap:4}}>
        <span style={{fontSize:10,color:FIFA.textDim}}>Rep:</span>
        <button onClick={()=>setRep(coladaKey,rep-1)} style={btnSm}>−</button>
        <span style={{fontSize:11,color:rep>0?FIFA.amber:FIFA.textDim,fontWeight:800,minWidth:14,textAlign:"center"}}>{rep}</span>
        <button onClick={()=>setRep(coladaKey,rep+1)} style={btnSm}>+</button>
      </div>)}
    </div>
  );
}
const btnSm={background:FIFA.border,border:"none",color:FIFA.text,borderRadius:5,width:20,height:20,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0,fontWeight:700};

// ─── SELEÇÃO CARD ─────────────────────────────────────────────────────────────
function SelecaoCard({sel,coladas,repetidas,toggle,setRep,expandida,onClick}) {
  const figs=gerarFigurinhasSel(sel),keys=figs.map(f=>`${sel.id}_${f.num}`);
  const cnt=keys.filter(k=>coladas.has(k)).length,pct=Math.round(cnt/20*100);
  const rep=keys.reduce((a,k)=>a+(repetidas[k]||0),0);
  return (
    <div style={{background:FIFA.bgCard,borderRadius:16,overflow:"hidden",border:`1px solid ${expandida?FIFA.magenta+"55":FIFA.border}`}}>
      <div onClick={onClick} style={{padding:"14px 16px",cursor:"pointer",background:expandida?FIFA.bgCard2:FIFA.bgCard,display:"flex",alignItems:"center",gap:13}}>
        <span style={{fontSize:32,lineHeight:1}}>{sel.bandeira}</span>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
            <span style={{color:FIFA.text,fontWeight:800,fontSize:14}}>{sel.nome}</span>
            <Badge bg={FIFA.border}>Grupo {sel.grupo}</Badge>
            {rep>0&&<Badge bg="#78350F" fg={FIFA.amber}>{rep} rep</Badge>}
            {cnt===20&&<Badge bg="#14532D" fg={FIFA.green}>✓ Completa</Badge>}
          </div>
          <ProgressBar pct={pct} grad={`linear-gradient(90deg,${sel.cor},${FIFA.orange})`}/>
          <div style={{fontSize:11,color:FIFA.textDim,marginTop:4,fontWeight:600}}>{cnt}/20 · {pct}%</div>
        </div>
        <span style={{color:FIFA.textDim,fontSize:15}}>{expandida?"▲":"▼"}</span>
      </div>
      {expandida&&(<div style={{padding:12,borderTop:`1px solid ${FIFA.border}`,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:7}}>
        {figs.map(f=>{const k=`${sel.id}_${f.num}`;return <FigurinhaCard key={k} fig={f} coladaKey={k} coladas={coladas} repetidas={repetidas} toggle={toggle} setRep={setRep}/>;})}
      </div>)}
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const {coladas,repetidas,toggle,setRep,marcarLote,addRepetida}=useStorage();
  const [expandida,setExpandida]=useState(null);
  const [busca,setBusca]=useState("");
  const [filtroGrupo,setFiltroGrupo]=useState("todos");
  const [filtroStatus,setFiltroStatus]=useState("todos");
  const [aba,setAba]=useState("album");
  const [cameraModal,setCameraModal]=useState(null);
  const [toast,setToast]=useState(null);
  const [gerandoPDF,setGerandoPDF]=useState(false);
  function showToast(msg,tipo="ok"){setToast({msg,tipo});setTimeout(()=>setToast(null),3500);}

  const especiaisKeys=useMemo(()=>{const k=[];ESPECIAIS.forEach(e=>{for(let i=1;i<=e.count;i++)k.push(`${e.id}_${i}`);});return k;},[]);
  const especiaisColadas=especiaisKeys.filter(k=>coladas.has(k)).length;
  const totalColadas=useMemo(()=>{let c=0;SELECOES.forEach(s=>{for(let i=1;i<=20;i++)if(coladas.has(`${s.id}_${i}`))c++;});return c+especiaisColadas;},[coladas,especiaisColadas]);
  const totalRepetidas=useMemo(()=>Object.values(repetidas).reduce((a,v)=>a+v,0),[repetidas]);
  const pctGeral=Math.round(totalColadas/TOTAL_ALBUM*100);

  const selecoesFiltradas=useMemo(()=>SELECOES.filter(s=>{
    if(filtroGrupo!=="todos"&&s.grupo!==filtroGrupo)return false;
    if(busca&&!s.nome.toLowerCase().includes(busca.toLowerCase()))return false;
    const c=[...Array(20)].filter((_,i)=>coladas.has(`${s.id}_${i+1}`)).length;
    if(filtroStatus==="faltando"&&c===20)return false;
    if(filtroStatus==="completas"&&c<20)return false;
    return true;
  }),[busca,filtroGrupo,filtroStatus,coladas]);

  const comRepetidas=useMemo(()=>{const r=[];SELECOES.forEach(s=>{const rs=[];for(let i=1;i<=20;i++){const k=`${s.id}_${i}`;if(repetidas[k]){const f=gerarFigurinhasSel(s)[i-1];rs.push({...f,key:k,rep:repetidas[k]});}}if(rs.length)r.push({sel:s,reps:rs});});return r;},[repetidas]);

  function copiarTrocas(){const l=["🔄 MINHAS REPETIDAS - Copa 2026 Panini\n"];comRepetidas.forEach(({sel,reps})=>{l.push(`${sel.bandeira} ${sel.nome}:`);reps.forEach(r=>l.push(`  ${r.codigo} ${r.label} (${r.rep}x)`));});navigator.clipboard.writeText(l.join("\n")).catch(()=>{});showToast("Lista copiada!");}

  async function handleGerarPDF(){setGerandoPDF(true);try{const doc=await gerarPDF(coladas,repetidas);doc.save(`figurinhas-copa2026-${new Date().toISOString().slice(0,10)}.pdf`);showToast("📄 PDF gerado!");}catch(e){showToast("Erro ao gerar PDF.","err");}finally{setGerandoPDF(false);}}

  function handleConfirm(resultado,acao){
    const d=resultado.dados,sel=SEL_BY_ID[d.selecao_id];if(!sel)return;
    if(resultado.tipo==="pagina"&&acao==="colada"){const novas=(d.coladas||[]).filter(n=>!coladas.has(`${sel.id}_${n}`));marcarLote(novas.map(n=>`${sel.id}_${n}`),true);showToast(`✅ ${novas.length} figurinhas de ${sel.nome}!`);}
    if(resultado.tipo==="verso"){const k=`${sel.id}_${d.numero}`;if(acao==="colada"){marcarLote([k],true);showToast(`✅ ${sel.id}${d.numero} registrada!`);}else if(acao==="repetida"){marcarLote([k],true);addRepetida(k);showToast(`🔁 ${sel.id}${d.numero} nas trocas!`,"rep");}}
  }

  const grupos=["todos","A","B","C","D","E","F","G","H","I","J","K","L"];

  return (
    <div style={{background:FIFA.bg,minHeight:"100vh",fontFamily:"'Inter','Segoe UI',system-ui,sans-serif",color:FIFA.text}}>
      {toast&&<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:toast.tipo==="rep"?"#92400E":toast.tipo==="err"?"#7f1d1d":"#14532D",color:"#fff",padding:"12px 22px",borderRadius:14,fontSize:13,fontWeight:700,zIndex:2000,boxShadow:"0 6px 28px rgba(0,0,0,0.6)",whiteSpace:"nowrap"}}>{toast.msg}</div>}
      {cameraModal&&<CameraModal modo={cameraModal} coladas={coladas} onClose={()=>setCameraModal(null)} onConfirm={handleConfirm}/>}

      {/* HEADER com gradiente FIFA */}
      <div style={{background:`linear-gradient(160deg,#13132B 0%,#1B1B3A 60%,#0A0A1A 100%)`,borderBottom:`1px solid ${FIFA.border}`,padding:"18px 16px 0",position:"relative",overflow:"hidden"}}>
        {/* faixa gradiente decorativa topo */}
        <div style={{position:"absolute",top:0,left:0,right:0,height:4,background:GRAD}}/>
        <div style={{maxWidth:900,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:13,marginBottom:16}}>
            <div style={{background:GRAD,borderRadius:14,padding:"10px 13px",fontSize:22,boxShadow:`0 4px 16px ${FIFA.magenta}55`}}>🏆</div>
            <div>
              <div style={{fontSize:19,fontWeight:900,letterSpacing:-0.5,background:GRAD_TEXT,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>FIFA WORLD CUP 26</div>
              <div style={{fontSize:11,color:FIFA.textDim,fontWeight:600,marginTop:1}}>Álbum Panini · 980 figurinhas · 🇨🇦 🇲🇽 🇺🇸</div>
            </div>
          </div>

          {/* Progresso */}
          <div style={{background:FIFA.bg,borderRadius:14,padding:"14px 16px",marginBottom:12,border:`1px solid ${FIFA.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
              <span style={{fontSize:12,color:FIFA.textDim,fontWeight:600}}>Progresso geral</span>
              <span style={{fontSize:24,fontWeight:900,background:GRAD_TEXT,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{pctGeral}%</span>
            </div>
            <ProgressBar pct={pctGeral}/>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:9,fontSize:11}}>
              <span><b style={{color:FIFA.green,fontSize:13}}>{totalColadas}</b> <span style={{color:FIFA.textDim}}>coladas</span></span>
              <span><b style={{color:FIFA.amber,fontSize:13}}>{TOTAL_ALBUM-totalColadas}</b> <span style={{color:FIFA.textDim}}>faltando</span></span>
              <span><b style={{color:FIFA.orange,fontSize:13}}>{totalRepetidas}</b> <span style={{color:FIFA.textDim}}>repetidas</span></span>
            </div>
          </div>

          {/* Botões */}
          <div style={{display:"flex",gap:8,marginBottom:13,flexWrap:"wrap"}}>
            <button onClick={()=>setCameraModal("pagina")} style={{flex:1,minWidth:100,background:`linear-gradient(135deg,${FIFA.purple},${FIFA.cyan})`,border:"none",borderRadius:12,color:"#fff",padding:"11px 8px",fontSize:12,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}><span style={{fontSize:15}}>📖</span> Escanear Página</button>
            <button onClick={()=>setCameraModal("verso")} style={{flex:1,minWidth:100,background:`linear-gradient(135deg,${FIFA.magenta},${FIFA.purple})`,border:"none",borderRadius:12,color:"#fff",padding:"11px 8px",fontSize:12,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}><span style={{fontSize:15}}>🔍</span> Ler Figurinha</button>
            <button onClick={handleGerarPDF} disabled={gerandoPDF} style={{flex:1,minWidth:100,background:gerandoPDF?FIFA.bgCard2:`linear-gradient(135deg,${FIFA.orange},${FIFA.magenta})`,border:"none",borderRadius:12,color:"#fff",padding:"11px 8px",fontSize:12,fontWeight:800,cursor:gerandoPDF?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5,opacity:gerandoPDF?0.6:1}}><span style={{fontSize:15}}>{gerandoPDF?"⏳":"📄"}</span> {gerandoPDF?"Gerando...":"Exportar PDF"}</button>
          </div>

          {/* Abas */}
          <div style={{display:"flex",gap:2}}>
            {[{k:"album",l:"🗂 Álbum"},{k:"resumo",l:"📊 Resumo"},{k:"trocas",l:"🔄 Trocas"}].map(a=>(
              <button key={a.k} onClick={()=>setAba(a.k)} style={{background:aba===a.k?FIFA.bgCard2:"transparent",border:"none",borderBottom:aba===a.k?`3px solid ${FIFA.orange}`:"3px solid transparent",color:aba===a.k?FIFA.text:FIFA.textDim,padding:"10px 15px",cursor:"pointer",fontSize:12,fontWeight:700,borderRadius:"8px 8px 0 0",transition:"all 0.15s"}}>{a.l}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:900,margin:"0 auto",padding:16}}>
        {aba==="album"&&(<>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
            <input placeholder="🔍 Buscar seleção..." value={busca} onChange={e=>setBusca(e.target.value)} style={{flex:1,minWidth:140,background:FIFA.bgCard,border:`1px solid ${FIFA.border}`,borderRadius:10,padding:"9px 13px",color:FIFA.text,fontSize:13,outline:"none"}}/>
            <select value={filtroGrupo} onChange={e=>setFiltroGrupo(e.target.value)} style={{background:FIFA.bgCard,border:`1px solid ${FIFA.border}`,borderRadius:10,color:FIFA.text,padding:"9px 11px",fontSize:12,cursor:"pointer"}}>{grupos.map(g=><option key={g} value={g}>{g==="todos"?"Todos grupos":`Grupo ${g}`}</option>)}</select>
            <select value={filtroStatus} onChange={e=>setFiltroStatus(e.target.value)} style={{background:FIFA.bgCard,border:`1px solid ${FIFA.border}`,borderRadius:10,color:FIFA.text,padding:"9px 11px",fontSize:12,cursor:"pointer"}}><option value="todos">Todas</option><option value="faltando">Com falta</option><option value="completas">Completas</option></select>
          </div>

          {/* Especiais */}
          <div style={{background:FIFA.bgCard,borderRadius:14,padding:14,marginBottom:14,border:`1px solid ${FIFA.amber}33`}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
              <span style={{color:FIFA.amber,fontWeight:800,fontSize:13}}>⭐ Especiais</span>
              <span style={{fontSize:11,color:FIFA.textDim}}>{especiaisColadas}/{especiaisKeys.length}</span>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {ESPECIAIS.map(e=>[...Array(e.count)].map((_,i)=>{const k=`${e.id}_${i+1}`,ok=coladas.has(k);
                return <button key={k} onClick={()=>toggle(k)} style={{background:ok?"#0E2A18":FIFA.bg,border:`1.5px solid ${ok?FIFA.green:FIFA.amber+"44"}`,borderRadius:8,padding:"5px 9px",cursor:"pointer",color:ok?FIFA.green:FIFA.amber,fontSize:10,fontWeight:700,transition:"all 0.15s"}}>{ok?"✓ ":""}{e.count===1?e.label:`${e.label} ${i+1}`}</button>;}))}
            </div>
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            {selecoesFiltradas.length===0&&<div style={{textAlign:"center",color:FIFA.textDim,padding:40,fontSize:13}}>Nenhuma seleção encontrada</div>}
            {selecoesFiltradas.map(sel=><SelecaoCard key={sel.id} sel={sel} coladas={coladas} repetidas={repetidas} toggle={toggle} setRep={setRep} expandida={expandida===sel.id} onClick={()=>setExpandida(expandida===sel.id?null:sel.id)}/>)}
          </div>
        </>)}

        {aba==="resumo"&&(<div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:16}}>
            {[["Coladas",totalColadas,FIFA.green,"✅"],["Faltando",TOTAL_ALBUM-totalColadas,FIFA.amber,"🔲"],["Repetidas",totalRepetidas,FIFA.orange,"🔁"],["Custo est. faltando",`R$${Math.ceil((TOTAL_ALBUM-totalColadas)/7)*7}`,FIFA.cyan,"💰"]].map((s,i)=>(
              <div key={i} style={{background:FIFA.bgCard,borderRadius:14,padding:15,border:`1px solid ${FIFA.border}`,textAlign:"center"}}>
                <div style={{fontSize:22,marginBottom:5}}>{s[3]}</div>
                <div style={{fontSize:21,fontWeight:900,color:s[2]}}>{s[1]}</div>
                <div style={{fontSize:10,color:FIFA.textDim,marginTop:3,fontWeight:600}}>{s[0]}</div>
              </div>))}
          </div>
          <button onClick={handleGerarPDF} disabled={gerandoPDF} style={{width:"100%",background:gerandoPDF?FIFA.bgCard2:`linear-gradient(135deg,${FIFA.orange},${FIFA.magenta})`,border:"none",borderRadius:12,color:"#fff",padding:14,fontSize:13,fontWeight:800,cursor:gerandoPDF?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:14,opacity:gerandoPDF?0.6:1}}><span style={{fontSize:18}}>{gerandoPDF?"⏳":"📄"}</span> {gerandoPDF?"Gerando PDF A4...":"Baixar PDF A4 — Minhas Figurinhas"}</button>
          <div style={{background:FIFA.bgCard,borderRadius:14,padding:15,border:`1px solid ${FIFA.border}`}}>
            <div style={{fontSize:13,fontWeight:800,color:FIFA.text,marginBottom:13}}>Progresso por Grupo</div>
            {["A","B","C","D","E","F","G","H","I","J","K","L"].map(g=>{
              const ss=SELECOES.filter(s=>s.grupo===g),tot=ss.length*20;
              const c=ss.reduce((a,s)=>{for(let i=1;i<=20;i++)if(coladas.has(`${s.id}_${i}`))a++;return a;},0);
              const p=Math.round(c/tot*100);
              return <div key={g} style={{marginBottom:11}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:11,color:FIFA.textDim,fontWeight:600}}>Grupo {g} · {ss.map(s=>s.bandeira).join(" ")}</span>
                  <span style={{fontSize:11,color:FIFA.orange,fontWeight:700}}>{c}/{tot}</span>
                </div>
                <ProgressBar pct={p}/>
              </div>;})}
          </div>
        </div>)}

        {aba==="trocas"&&(<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div><div style={{fontSize:14,fontWeight:800}}>Figurinhas para trocar</div><div style={{fontSize:11,color:FIFA.textDim}}>{totalRepetidas} repetidas</div></div>
            <button onClick={copiarTrocas} style={{background:FIFA.bgCard2,border:`1px solid ${FIFA.border}`,borderRadius:10,color:FIFA.orange,padding:"9px 13px",fontSize:12,fontWeight:700,cursor:"pointer"}}>📋 Copiar</button>
          </div>
          {comRepetidas.length===0?(<div style={{textAlign:"center",color:FIFA.textDim,padding:60,fontSize:13}}><div style={{fontSize:32,marginBottom:10}}>🔁</div>Nenhuma repetida ainda.</div>):(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {comRepetidas.map(({sel,reps})=>(<div key={sel.id} style={{background:FIFA.bgCard,borderRadius:14,padding:14,border:`1px solid ${FIFA.border}`}}>
                <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:10}}>
                  <span style={{fontSize:22}}>{sel.bandeira}</span>
                  <span style={{fontWeight:800,fontSize:13}}>{sel.nome}</span>
                  <Badge bg="#78350F" fg={FIFA.amber}>{reps.reduce((a,r)=>a+r.rep,0)} rep</Badge>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {reps.map(r=><div key={r.key} style={{background:"#1A1200",border:`1px solid ${FIFA.amber}55`,borderRadius:7,padding:"3px 8px",fontSize:10}}><span style={{color:FIFA.amber,fontWeight:700}}>{r.codigo}</span><span style={{color:FIFA.textDim,marginLeft:4}}>{r.label}</span><span style={{color:FIFA.orange,marginLeft:5,fontWeight:800}}>×{r.rep}</span></div>)}
                </div>
              </div>))}
            </div>)}
        </div>)}
      </div>

      <div style={{textAlign:"center",padding:"16px 0 28px",color:FIFA.border,fontSize:10}}>FIFA World Cup 26 · Panini · 980 figurinhas · 48 seleções</div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
