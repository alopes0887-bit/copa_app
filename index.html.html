// ─── jsPDF via CDN ───────────────────────────────────────────────────────────
function loadJsPDF() {
  return new Promise((resolve, reject) => {
    if (window.jspdf) { resolve(window.jspdf.jsPDF); return; }
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    s.onload = () => resolve(window.jspdf.jsPDF);
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

// ─── STORAGE ──────────────────────────────────────────────────────────────────

function useStorage() {
  const KEY = "copa2026_v3";
  const [coladas, setColadas] = useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem(KEY)||"[]")); }
    catch { return new Set(); }
  });
  const [repetidas, setRepetidas] = useState(() => {
    try { return JSON.parse(localStorage.getItem(KEY+"_rep")||"{}"); }
    catch { return {}; }
  });
  const save = useCallback((c,r) => {
    localStorage.setItem(KEY, JSON.stringify([...c]));
    localStorage.setItem(KEY+"_rep", JSON.stringify(r));
  },[]);
  const toggle = useCallback((key) => {
    setColadas(prev => {
      const next = new Set(prev);
      if (next.has(key)) next.delete(key); else next.add(key);
      save(next, repetidas); return next;
    });
  },[repetidas,save]);
  const setRep = useCallback((key,val) => {
    setRepetidas(prev => {
      const next={...prev};
      if(val<=0) delete next[key]; else next[key]=val;
      save(coladas,next); return next;
    });
  },[coladas,save]);
  const marcarLote = useCallback((keys,valor) => {
    setColadas(prev => {
      const next=new Set(prev);
      keys.forEach(k => valor?next.add(k):next.delete(k));
      save(next,repetidas); return next;
    });
  },[repetidas,save]);
  const addRepetida = useCallback((key) => {
    setRepetidas(prev => {
      const next={...prev,[key]:(prev[key]||0)+1};
      save(coladas,next); return next;
    });
  },[coladas,save]);
  return {coladas,repetidas,toggle,setRep,marcarLote,addRepetida};
}

// ─── PDF GENERATOR ────────────────────────────────────────────────────────────

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

async function gerarPDF(coladas, repetidas) {
  const JsPDF = await loadJsPDF();
  const doc = new JsPDF({ orientation:"portrait", unit:"mm", format:"a4" });

  // Dimensões A4
  const PW = 210, PH = 297;
  const ML = 12, MR = 12, MT = 14, MB = 14;
  const CW = PW - ML - MR; // largura útil = 186mm

  // Paleta
  const C_BG   = [8, 8, 20];
  const C_GOLD  = [232,200,74];
  const C_WHITE = [240,240,240];
  const C_GRAY  = [100,100,120];
  const C_LGRAY = [40,40,65];
  const C_GREEN = [74,222,128];
  const C_AMBER = [245,158,11];
  const C_DARK  = [20,20,40];

  // ── Funções auxiliares ──
  function setRGB(arr) { doc.setTextColor(arr[0],arr[1],arr[2]); }
  function setFillRGB(arr) { doc.setFillColor(arr[0],arr[1],arr[2]); }
  function setDrawRGB(arr) { doc.setDrawColor(arr[0],arr[1],arr[2]); }

  // Cabeçalho de página
  function drawPageHeader(pg, totalPg) {
    // Fundo escuro topo
    setFillRGB(C_BG);
    doc.rect(0,0,PW,MT+4,"F");
    // Linha dourada
    setFillRGB(C_GOLD);
    doc.rect(0,MT+2,PW,0.7,"F");
    // Título
    doc.setFont("helvetica","bold");
    doc.setFontSize(9);
    setRGB(C_GOLD);
    doc.text("COPA DO MUNDO 2026 — Album Panini — Minhas Figurinhas", ML, MT-1);
    // Paginação
    doc.setFontSize(7);
    setRGB(C_GRAY);
    doc.text(`pag. ${pg} / ${totalPg}`, PW-MR, MT-1, {align:"right"});
  }

  function drawPageFooter() {
    setFillRGB(C_BG);
    doc.rect(0,PH-MB,PW,MB,"F");
    doc.setFont("helvetica","normal");
    doc.setFontSize(7);
    setRGB(C_GRAY);
    const dt = new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric"});
    doc.text(`Gerado em ${dt}`, ML, PH-5);
    doc.text("48 selecoes · 980 figurinhas", PW-MR, PH-5, {align:"right"});
  }

  // ── Monta dados ──
  // Estatísticas gerais
  let totalColadas = 0;
  SELECOES.forEach(s => {
    for (let i=1;i<=20;i++) if(coladas.has(`${s.id}_${i}`)) totalColadas++;
  });
  const pctGeral = Math.round((totalColadas/TOTAL_ALBUM)*100);
  const totalRep = Object.values(repetidas).reduce((a,v)=>a+v,0);

  // Agrupar seleções por grupo
  const grupos = {};
  SELECOES.forEach(s => {
    if(!grupos[s.grupo]) grupos[s.grupo]=[];
    grupos[s.grupo].push(s);
  });

  // ── Página 1: Capa / Resumo ──
  let pg = 1;
  // Calcular total páginas: capa + ceil(48/2) seleções por pag (2 cols × N rows)
  // Cada seleção ocupa ~38mm. CW/2=93mm. Cabe 6 seleções por pag em 2 colunas → 24 por pag
  // 48 seleções → 2 páginas de conteúdo + 1 capa = 3 páginas
  const SELS_PER_PAGE = 6; // 2 colunas × 3 linhas
  const totalSelPags = Math.ceil(SELECOES.length / SELS_PER_PAGE);
  const TOTAL_PGS = 1 + totalSelPags;

  // ── Página 1: Capa ──
  setFillRGB(C_BG);
  doc.rect(0,0,PW,PH,"F");

  // Faixa dourada topo
  setFillRGB(C_GOLD);
  doc.rect(0,0,PW,2,"F");
  doc.rect(0,PH-2,PW,2,"F");

  // Título central
  doc.setFont("helvetica","bold");
  doc.setFontSize(22);
  setRGB(C_GOLD);
  doc.text("COPA DO MUNDO 2026", PW/2, 60, {align:"center"});

  doc.setFontSize(13);
  setRGB(C_WHITE);
  doc.text("ALBUM PANINI", PW/2, 72, {align:"center"});

  doc.setFontSize(9);
  setRGB(C_GRAY);
  doc.text("Controle de Figurinhas", PW/2, 80, {align:"center"});

  // Linha separadora
  setFillRGB(C_LGRAY);
  doc.rect(ML+20, 86, CW-40, 0.4, "F");

  // Stats box
  const SBX = ML+10, SBY = 93, SBW = CW-20, SBH = 50;
  setFillRGB(C_DARK);
  doc.roundedRect(SBX, SBY, SBW, SBH, 3, 3, "F");
  setDrawRGB(C_LGRAY);
  doc.setLineWidth(0.3);
  doc.roundedRect(SBX, SBY, SBW, SBH, 3, 3, "S");

  // Progresso geral — barra
  doc.setFont("helvetica","bold");
  doc.setFontSize(8);
  setRGB(C_GRAY);
  doc.text("PROGRESSO GERAL", SBX+SBW/2, SBY+9, {align:"center"});

  doc.setFontSize(28);
  setRGB(C_GOLD);
  doc.text(`${pctGeral}%`, SBX+SBW/2, SBY+22, {align:"center"});

  // Barra de progresso
  const BX=SBX+8, BY=SBY+26, BW=SBW-16, BH=5;
  setFillRGB(C_LGRAY);
  doc.roundedRect(BX,BY,BW,BH,2,2,"F");
  setFillRGB(C_GOLD);
  doc.roundedRect(BX,BY,BW*(pctGeral/100),BH,2,2,"F");

  // Números
  const col3w = (SBW-16)/3;
  const statsY = SBY+40;
  [
    {v:`${totalColadas}`, label:"coladas", c:C_GREEN},
    {v:`${TOTAL_ALBUM-totalColadas}`, label:"faltando", c:C_AMBER},
    {v:`${totalRep}`, label:"repetidas", c:[249,115,22]},
  ].forEach((s,i) => {
    const sx = SBX+8 + i*col3w + col3w/2;
    doc.setFont("helvetica","bold");
    doc.setFontSize(14);
    setRGB(s.c);
    doc.text(s.v, sx, statsY, {align:"center"});
    doc.setFontSize(7);
    setRGB(C_GRAY);
    doc.text(s.label, sx, statsY+6, {align:"center"});
  });

  // Resumo por grupo (tabela simples)
  let gy = SBY + SBH + 14;
  doc.setFont("helvetica","bold");
  doc.setFontSize(8);
  setRGB(C_GOLD);
  doc.text("RESUMO POR GRUPO", ML, gy);
  gy += 5;

  const grpKeys = Object.keys(grupos).sort();
  const GCOLS = 4;
  const GCW = CW / GCOLS;

  grpKeys.forEach((g, gi) => {
    const col = gi % GCOLS;
    const row = Math.floor(gi / GCOLS);
    const gx = ML + col * GCW;
    const gry = gy + row * 22;

    const sels = grupos[g];
    const tot = sels.length * 20;
    const cnt = sels.reduce((acc,s) => {
      for(let i=1;i<=20;i++) if(coladas.has(`${s.id}_${i}`)) acc++;
      return acc;
    }, 0);
    const gpct = Math.round((cnt/tot)*100);

    // Caixa
    setFillRGB(C_DARK);
    doc.roundedRect(gx, gry, GCW-2, 20, 1.5, 1.5, "F");

    doc.setFont("helvetica","bold");
    doc.setFontSize(7);
    setRGB(C_GOLD);
    doc.text(`GRUPO ${g}`, gx+3, gry+5);
    doc.setFont("helvetica","normal");
    doc.setFontSize(6);
    setRGB(C_GRAY);
    doc.text(`${cnt}/${tot} (${gpct}%)`, gx+3, gry+9.5);

    // Mini barra
    const mbx=gx+3, mby=gry+12, mbw=GCW-8, mbh=3;
    setFillRGB(C_LGRAY);
    doc.roundedRect(mbx,mby,mbw,mbh,1,1,"F");
    setFillRGB(C_GOLD);
    if(gpct>0) doc.roundedRect(mbx,mby,mbw*(gpct/100),mbh,1,1,"F");

    // Bandeiras
    doc.setFontSize(6.5);
    setRGB(C_GRAY);
    doc.text(sels.map(s=>s.nome.substring(0,4)).join("  "), gx+3, gry+18);
  });

  // Data geração
  const dtFull = new Date().toLocaleString("pt-BR");
  gy += Math.ceil(grpKeys.length/GCOLS)*22 + 10;
  doc.setFont("helvetica","normal");
  doc.setFontSize(7);
  setRGB(C_GRAY);
  doc.text(`Gerado em ${dtFull}`, PW/2, gy, {align:"center"});
  doc.text("48 selecoes · 980 figurinhas · EUA, Canada e Mexico 2026", PW/2, gy+5, {align:"center"});

  // Paginação capa
  doc.setFontSize(7);
  doc.text(`1 / ${TOTAL_PGS}`, PW-MR, PH-5, {align:"right"});

  // ── Páginas de seleções ──
  // Layout: 2 colunas × 3 linhas por página = 6 seleções/página
  // Cada bloco: ~60mm altura, 91mm largura
  const COL_NUM = 2;
  const ROW_NUM = 3;
  const BLK_W = (CW - 4) / COL_NUM;   // ~91mm
  const BLK_H = (PH - MT - MB - 10) / ROW_NUM; // ~85mm
  const CONTENT_TOP = MT + 6;

  for (let si = 0; si < SELECOES.length; si++) {
    const pageInBlock = Math.floor(si / SELS_PER_PAGE);
    const posInPage   = si % SELS_PER_PAGE;

    if (posInPage === 0) {
      doc.addPage();
      pg++;
      setFillRGB(C_BG);
      doc.rect(0,0,PW,PH,"F");
      drawPageHeader(pg, TOTAL_PGS);
      drawPageFooter();
    }

    const col = posInPage % COL_NUM;
    const row = Math.floor(posInPage / COL_NUM);
    const bx  = ML + col * (BLK_W + 4);
    const by  = CONTENT_TOP + row * BLK_H;

    const sel = SELECOES[si];
    const figs = gerarFigurinhasSel(sel);
    const keys = figs.map(f=>`${sel.id}_${f.num}`);
    const cnt  = keys.filter(k=>coladas.has(k)).length;
    const pct  = Math.round((cnt/20)*100);
    const rTotal = keys.reduce((a,k)=>a+(repetidas[k]||0),0);
    const [cr,cg,cb] = hexToRgb(sel.cor);

    // ── Bloco de seleção ──
    // Fundo
    setFillRGB(C_DARK);
    doc.roundedRect(bx, by, BLK_W, BLK_H-2, 2, 2, "F");
    // Borda lateral colorida da seleção
    setFillRGB([cr,cg,cb]);
    doc.roundedRect(bx, by, 2.5, BLK_H-2, 1, 1, "F");

    // Cabeçalho do bloco
    doc.setFont("helvetica","bold");
    doc.setFontSize(8.5);
    setRGB(C_WHITE);
    doc.text(sel.nome.toUpperCase(), bx+5, by+6);

    // Grupo badge
    doc.setFont("helvetica","normal");
    doc.setFontSize(6);
    setRGB([cr,cg,cb]);
    doc.text(`GRP ${sel.grupo}`, bx+BLK_W-3, by+6, {align:"right"});

    // Progresso linha
    doc.setFont("helvetica","bold");
    doc.setFontSize(7);
    setRGB(pct===100?C_GREEN:C_GOLD);
    doc.text(`${cnt}/20`, bx+5, by+12);
    if(rTotal>0) {
      doc.setFontSize(6);
      setRGB(C_AMBER);
      doc.text(`${rTotal} rep.`, bx+22, by+12);
    }

    // Mini barra progresso
    const pbx=bx+5, pby=by+14, pbw=BLK_W-10, pbh=2.5;
    setFillRGB(C_LGRAY);
    doc.roundedRect(pbx,pby,pbw,pbh,1,1,"F");
    if(pct>0) {
      setFillRGB(pct===100?C_GREEN:C_GOLD);
      doc.roundedRect(pbx,pby,pbw*(pct/100),pbh,1,1,"F");
    }

    // Linha divisória
    setFillRGB(C_LGRAY);
    doc.rect(bx+5, by+19, BLK_W-10, 0.3, "F");

    // Grid de figurinhas: 4 colunas × 5 linhas = 20 figurinhas
    const FCOLS = 4, FROWS = 5;
    const FW = (BLK_W-10) / FCOLS;
    const FH = (BLK_H - 25) / FROWS;
    const FX0 = bx+5, FY0 = by+21;

    figs.forEach((fig,fi) => {
      const fc  = fi % FCOLS;
      const fr  = Math.floor(fi/FCOLS);
      const fx  = FX0 + fc*FW;
      const fy  = FY0 + fr*FH;
      const key = `${sel.id}_${fig.num}`;
      const has = coladas.has(key);
      const rep = repetidas[key]||0;

      // Fundo célula
      if(has) {
        setFillRGB([14,42,14]);
        doc.roundedRect(fx,fy,FW-1,FH-1,0.8,0.8,"F");
        // Borda verde
        setDrawRGB(C_GREEN);
        doc.setLineWidth(0.2);
        doc.roundedRect(fx,fy,FW-1,FH-1,0.8,0.8,"S");
      } else {
        setFillRGB([15,15,26]);
        doc.roundedRect(fx,fy,FW-1,FH-1,0.8,0.8,"F");
        setDrawRGB(C_LGRAY);
        doc.setLineWidth(0.15);
        doc.roundedRect(fx,fy,FW-1,FH-1,0.8,0.8,"S");
      }

      // Número
      doc.setFont("helvetica",has?"bold":"normal");
      doc.setFontSize(5.5);
      setRGB(has?C_GREEN:C_GRAY);
      doc.text(`#${fig.num}`, fx+1.2, fy+3.8);

      // Label truncado
      const lbl = fig.label.length>11 ? fig.label.substring(0,10)+"." : fig.label;
      doc.setFont("helvetica","normal");
      doc.setFontSize(4.5);
      setRGB(has?[180,255,180]:C_GRAY);
      doc.text(lbl, fx+1.2, fy+6.5);

      // Check mark
      if(has) {
        doc.setFont("helvetica","bold");
        doc.setFontSize(6);
        setRGB(C_GREEN);
        doc.text("✓", fx+FW-4, fy+3.8);
      }

      // Repetida badge
      if(rep>0) {
        setFillRGB([120,53,15]);
        doc.roundedRect(fx+1,fy+FH-4,6,3,0.5,0.5,"F");
        doc.setFont("helvetica","bold");
        doc.setFontSize(4);
        setRGB([245,158,11]);
        doc.text(`x${rep}`, fx+2, fy+FH-2);
      }

      // Estrela para especial
      if(fig.especial) {
        doc.setFontSize(4.5);
        setRGB(C_GOLD);
        doc.text("★", fx+FW-3.5, fy+FH-2);
      }
    });
  }

  return doc;
}

// ─── CLAUDE API ──────────────────────────────────────────────────────────────

async function callClaude(messages, systemPrompt) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1000, system:systemPrompt, messages }),
  });
  const data = await res.json();
  return data.content?.find(b=>b.type==="text")?.text||"";
}

function imageToBase64(file) {
  return new Promise((res,rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function ProgressBar({pct,color}) {

        background:`linear-gradient(90deg,${color||"#e8c84a"},${color||"#e8c84a"}88)`,
        borderRadius:8,transition:"width 0.4s ease"}}/>
    </div>
  );
}

function Badge({children,color="#1e1e35"}) {
  return (

function CameraModal({modo,onClose,onConfirm,coladas}) {
  const [fase,setFase] = useState("captura");
  const [imgSrc,setImgSrc] = useState(null);
  const [imgFile,setImgFile] = useState(null);
  const [resultado,setResultado] = useState(null);
  const [erro,setErro] = useState(null);
  const fileRef = useRef();
  const videoRef = useRef();
  const [usarCamera,setUsarCamera] = useState(false);
  const [stream,setStream] = useState(null);

  useEffect(()=>()=>{if(stream)stream.getTracks().forEach(t=>t.stop());},[stream]);

  async function abrirCamera() {
    try {
      const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}}});
      setStream(s); setUsarCamera(true);
      setTimeout(()=>{if(videoRef.current)videoRef.current.srcObject=s;},100);
    } catch { fileRef.current?.click(); }
  }

  function capturarFrame() {
    const v=videoRef.current; if(!v) return;
    const c=document.createElement("canvas"); c.width=v.videoWidth; c.height=v.videoHeight;
    c.getContext("2d").drawImage(v,0,0);
    c.toBlob(blob=>{
      const f=new File([blob],"cap.jpg",{type:"image/jpeg"});
      setImgFile(f); setImgSrc(c.toDataURL("image/jpeg"));
      stream?.getTracks().forEach(t=>t.stop()); setUsarCamera(false);
    },"image/jpeg",0.85);
  }

  function selecionarArquivo(e) {
    const f=e.target.files[0]; if(!f) return;
    setImgFile(f); setImgSrc(URL.createObjectURL(f));
  }

  async function analisar() {
    if(!imgFile) return;
    setFase("analisando"); setErro(null);

      const b64 = await imageToBase64(imgFile);

        const system = `Voce e especialista no album de figurinhas Copa 2026 Panini. 48 selecoes, cada uma com 20 figurinhas (1=Escudo metalizado, 2-3=Goleiros, 4-6=Zagueiros, 7-8=Laterais, 9-10=Volantes, 11-13=Meias, 14-16=Atacantes, 17=Capitao, 18=Tecnico, 19-20=Fotos). IDs disponiveis: ${selIds}. Analise a imagem da pagina do album. Identifique espacos com figurinha colada vs vazios. Responda SOMENTE JSON valido sem markdown: {"selecao_id":"ID","selecao_nome":"NOME","coladas":[1,2,5],"vazias":[3,4],"confianca":"alta|media|baixa","observacao":"..."}`;
        const text = await callClaude([{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:imgFile.type,data:b64}},
          {type:"text",text:"Analise esta pagina do album."}
        ]}],system);
        setResultado({tipo:"pagina",dados:JSON.parse(text.replace(/```json|```/g,"").trim())});
      } else {
        const system = `Voce e especialista em figurinhas Copa 2026 Panini. Analise o verso da figurinha. IDs: ${selIds}. Identifique selecao e numero (1-20). Responda SOMENTE JSON valido sem markdown: {"selecao_id":"ID","selecao_nome":"NOME","numero":5,"descricao":"...","confianca":"alta|media|baixa"}`;
        const text = await callClaude([{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:imgFile.type,data:b64}},
          {type:"text",text:"Identifique esta figurinha pelo verso."}
        ]}],system);
        setResultado({tipo:"verso",dados:JSON.parse(text.replace(/```json|```/g,"").trim())});
      }
      setFase("resultado");
    } catch(e) {
      setErro("Erro ao analisar. Tente novamente."); setFase("captura");
    }
  }

  function confirmar(acao) { onConfirm(resultado,acao); onClose(); }

  const corConf = {alta:"#4ade80",media:"#f59e0b",baixa:"#f87171"};

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.93)",zIndex:1000,display:"flex",flexDirection:"column",overflowY:"auto"}}>

        <button onClick={onClose} style={{background:"#1e1e35",border:"none",borderRadius:8,color:"#aaa",padding:"6px 10px",cursor:"pointer",fontSize:16}}>←</button>
        <div>
          <div style={{fontWeight:700,fontSize:14,color:"#e0e0e0"}}>{modo==="pagina"?"📖 Escanear Página":"🔍 Identificar Figurinha"}</div>
          <div style={{fontSize:11,color:"#555"}}>{modo==="pagina"?"Fotografe a página aberta do álbum":"Fotografe o verso da figurinha"}</div>
        </div>
      </div>

      <div style={{padding:16,flex:1}}>
        {fase==="captura" && (
          <div>
            {usarCamera && (
              <div style={{marginBottom:16,borderRadius:12,overflow:"hidden",border:"2px solid #e8c84a"}}>
                <video ref={videoRef} autoPlay playsInline style={{width:"100%",display:"block",maxHeight:360,objectFit:"cover"}}/>
                <button onClick={capturarFrame} style={{width:"100%",background:"#e8c84a",border:"none",color:"#000",padding:14,fontSize:15,fontWeight:700,cursor:"pointer"}}>📸 Capturar</button>
              </div>
            )}
            {imgSrc&&!usarCamera&&(
              <div style={{marginBottom:16,borderRadius:12,overflow:"hidden",border:"2px solid #2a2a40"}}>
                <img src={imgSrc} alt="preview" style={{width:"100%",display:"block",maxHeight:400,objectFit:"contain",background:"#0a0a14"}}/>
              </div>
            )}
            {!usarCamera&&(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {!imgSrc&&(
                  <div style={{background:"#0d0d1f",border:"1px dashed #2a2a40",borderRadius:12,padding:20,textAlign:"center",marginBottom:4}}>
                    <div style={{fontSize:40,marginBottom:8}}>{modo==="pagina"?"📖":"🔄"}</div>
                    <div style={{color:"#888",fontSize:13}}>{modo==="pagina"?"Abra o álbum na página e tire uma foto nítida":"Coloque o verso da figurinha para cima e tire uma foto nítida"}</div>
                  </div>
                )}
                <button onClick={abrirCamera} style={{background:"#e8c84a",border:"none",borderRadius:10,color:"#000",padding:14,fontSize:14,fontWeight:700,cursor:"pointer"}}>📷 Abrir câmera</button>
                <button onClick={()=>fileRef.current?.click()} style={{background:"#1e1e35",border:"1px solid #3a3a60",borderRadius:10,color:"#e0e0e0",padding:12,fontSize:13,fontWeight:600,cursor:"pointer"}}>🖼 Galeria</button>
                <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={selecionarArquivo}/>
                {imgSrc&&(
                  <button onClick={analisar} style={{background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:10,color:"#fff",padding:14,fontSize:14,fontWeight:700,cursor:"pointer",marginTop:4}}>✨ Analisar com IA</button>
                )}
                {erro&&<div style={{background:"#2a0a0a",border:"1px solid #7f1d1d",borderRadius:8,padding:12,color:"#f87171",fontSize:13}}>{erro}</div>}
              </div>
            )}
          </div>
        )}

        {fase==="analisando"&&(
          <div style={{textAlign:"center",padding:"60px 20px"}}>
            {imgSrc&&<div style={{marginBottom:24,borderRadius:12,overflow:"hidden",opacity:0.5}}><img src={imgSrc} alt="p" style={{width:"100%",maxHeight:200,objectFit:"contain"}}/></div>}
            <div style={{fontSize:40,marginBottom:16}}>✨</div>
            <div style={{color:"#e8c84a",fontWeight:700,fontSize:16,marginBottom:8}}>Analisando com IA...</div>
            <div style={{color:"#555",fontSize:13}}>{modo==="pagina"?"Identificando figurinhas na página":"Identificando a figurinha pelo verso"}</div>

          <div>
            {imgSrc&&<div style={{marginBottom:14,borderRadius:12,overflow:"hidden",border:"2px solid #2a2a40"}}><img src={imgSrc} alt="p" style={{width:"100%",maxHeight:220,objectFit:"contain",background:"#0a0a14"}}/></div>}

            {resultado.tipo==="pagina"&&(()=>{
              const d=resultado.dados;
              const sel=SELECOES.find(s=>s.id===d.selecao_id);
              const figs=sel?gerarFigurinhasSel(sel):[];
              const novas=(d.coladas||[]).filter(n=>!coladas.has(`${d.selecao_id}_${n}`));
              return (
                <div>
                  <div style={{background:"#0d0d1f",borderRadius:12,padding:14,marginBottom:12,border:"1px solid #1e1e35"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                      <span style={{fontSize:28}}>{sel?.bandeira||"🏳"}</span>
                      <div>
                        <div style={{fontWeight:700,fontSize:15}}>{d.selecao_nome||"Desconhecida"}</div>
                        <div style={{display:"flex",gap:6,marginTop:4}}>
                          <Badge color={corConf[d.confianca]}>Confiança: {d.confianca}</Badge>
                          <Badge color="#1e3a5f">{(d.coladas||[]).length} coladas · {(d.vazias||[]).length} vazias</Badge>
                        </div>
                      </div>
                    </div>
                    {d.observacao&&<div style={{fontSize:12,color:"#666",fontStyle:"italic"}}>{d.observacao}</div>}
                  </div>
                  <div style={{background:"#0d0d1f",borderRadius:12,padding:14,marginBottom:14,border:"1px solid #1e1e35"}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#e0e0e0",marginBottom:10}}>Figurinhas identificadas:</div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
                      {figs.map(f=>{

                        const jaE=coladas.has(`${d.selecao_id}_${f.num}`);
                        return(
                          <div key={f.num} style={{background:isC?(jaE?"#1a2a1a":"#0f2a0f"):"#0f0f1a",border:`1.5px solid ${isC?(jaE?"#4ade8066":"#4ade80"):"#2a2a40"}`,borderRadius:8,padding:"6px 4px",textAlign:"center"}}>

            {resultado.tipo==="verso"&&(()=>{
              const d=resultado.dados;

              const figs=sel?gerarFigurinhasSel(sel):[];
              const fig=figs.find(f=>f.num===d.numero);

                      </div>
                    </div>
                    {d.descricao&&<div style={{fontSize:12,color:"#666",fontStyle:"italic"}}>{d.descricao}</div>}
                    {jaC&&<div style={{background:"#1a2e1a",borderRadius:8,padding:"8px 12px",marginTop:10,color:"#4ade80",fontSize:13,fontWeight:600}}>✅ Já está no seu álbum</div>}
                  </div>
                  {d.selecao_id!=="DESCONHECIDA"&&d.numero>0&&(
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      {!jaC&&<button onClick={()=>confirmar("colada")} style={{background:"linear-gradient(135deg,#16a34a,#15803d)",border:"none",borderRadius:10,color:"#fff",padding:14,fontSize:14,fontWeight:700,cursor:"pointer"}}>✅ Tenho esta (registrar no álbum)</button>}
                      <button onClick={()=>confirmar("repetida")} style={{background:"linear-gradient(135deg,#92400e,#78350f)",border:"none",borderRadius:10,color:"#fff",padding:14,fontSize:14,fontWeight:700,cursor:"pointer"}}>🔁 É repetida (registrar para troca)</button>
                      <button onClick={()=>{setFase("captura");setResultado(null);setImgSrc(null);setImgFile(null);}} style={{background:"#1e1e35",border:"1px solid #3a3a60",borderRadius:10,color:"#aaa",padding:12,fontSize:13,cursor:"pointer"}}>🔄 Não é isso — tentar novamente</button>
                    </div>
                  )}
                  {(d.selecao_id==="DESCONHECIDA"||d.numero===0)&&(
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      <div style={{background:"#2a1a0a",border:"1px solid #92400e",borderRadius:8,padding:12,color:"#f59e0b",fontSize:13}}>Não consegui identificar. Tente uma foto mais nítida.</div>
                      <button onClick={()=>{setFase("captura");setResultado(null);setImgSrc(null);setImgFile(null);}} style={{background:"#1e1e35",border:"1px solid #3a3a60",borderRadius:10,color:"#e0e0e0",padding:12,fontSize:13,cursor:"pointer"}}>🔄 Tentar novamente</button>
                    </div>
                  )}
                </div>
              );
            })()}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── FIGURINHA CARD ───────────────────────────────────────────────────────────

function FigurinhaCard({fig,coladaKey,coladas,repetidas,toggle,setRep}) {
  const colada=coladas.has(coladaKey);
  const rep=repetidas[coladaKey]||0;
  return (
    <div onClick={()=>toggle(coladaKey)} style={{background:colada?"#0e2a0e":"#0f0f1a",border:`1.5px solid ${colada?"#4ade80":fig.especial?"#e8c84a44":"#1e1e35"}`,borderRadius:10,padding:"8px 10px",cursor:"pointer",transition:"all 0.15s",position:"relative",opacity:colada?1:0.6,userSelect:"none"}}>
      {fig.especial&&<span style={{position:"absolute",top:4,right:6,fontSize:9,color:"#e8c84a"}}>★</span>}
      <div style={{fontSize:10,color:"#555",marginBottom:1}}>#{fig.num}</div>
      <div style={{fontSize:11,color:colada?"#4ade80":"#999",fontWeight:600,lineHeight:1.2}}>{colada?"✓ ":""}{fig.label}</div>
      {colada&&(
        <div onClick={e=>e.stopPropagation()} style={{marginTop:6,display:"flex",alignItems:"center",gap:4}}>
          <span style={{fontSize:10,color:"#666"}}>Rep:</span>
          <button onClick={()=>setRep(coladaKey,rep-1)} style={btnSm}>−</button>
          <span style={{fontSize:11,color:rep>0?"#f59e0b":"#444",fontWeight:700,minWidth:14,textAlign:"center"}}>{rep}</span>
          <button onClick={()=>setRep(coladaKey,rep+1)} style={btnSm}>+</button>
        </div>
      )}
    </div>
  );
}
const btnSm={background:"#2a2a40",border:"none",color:"#aaa",borderRadius:4,width:18,height:18,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0};

// ─── SELEÇÃO CARD ─────────────────────────────────────────────────────────────

function SelecaoCard({sel,coladas,repetidas,toggle,setRep,expandida,onClick}) {
  const figs=gerarFigurinhasSel(sel);
  const keys=figs.map(f=>`${sel.id}_${f.num}`);
  const cnt=keys.filter(k=>coladas.has(k)).length;
  const pct=Math.round((cnt/20)*100);
  const rep=keys.reduce((a,k)=>a+(repetidas[k]||0),0);
  return (
    <div style={{background:"#0d0d1f",borderRadius:14,overflow:"hidden",border:"1px solid #1a1a30"}}>
      <div onClick={onClick} style={{padding:"13px 16px",cursor:"pointer",background:expandida?"#111128":"#0d0d1f",display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:26}}>{sel.bandeira}</span>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
            <span style={{color:"#f0f0f0",fontWeight:700,fontSize:13}}>{sel.nome}</span>
            <Badge color="#1e1e35">G{sel.grupo}</Badge>
            {rep>0&&<Badge color="#78350f">{rep} rep</Badge>}
            {cnt===20&&<Badge color="#14532d">✓ Completa</Badge>}
          </div>
          <ProgressBar pct={pct} color={sel.cor}/>
          <div style={{fontSize:11,color:"#555",marginTop:3}}>{cnt}/20 · {pct}%</div>
        </div>
        <span style={{color:"#333",fontSize:14}}>{expandida?"▲":"▼"}</span>
      </div>
      {expandida&&(
        <div style={{padding:12,borderTop:"1px solid #1a1a30",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(115px,1fr))",gap:7}}>
          {figs.map(f=>{
            const k=`${sel.id}_${f.num}`;
            return <FigurinhaCard key={k} fig={f} coladaKey={k} coladas={coladas} repetidas={repetidas} toggle={toggle} setRep={setRep}/>;
          })}
        </div>
      )}
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────

function App() {
  const {coladas,repetidas,toggle,setRep,marcarLote,addRepetida} = useStorage();
  const [expandida,setExpandida] = useState(null);
  const [busca,setBusca] = useState("");
  const [filtroGrupo,setFiltroGrupo] = useState("todos");
  const [filtroStatus,setFiltroStatus] = useState("todos");
  const [aba,setAba] = useState("album");
  const [cameraModal,setCameraModal] = useState(null);
  const [toast,setToast] = useState(null);
  const [gerandoPDF,setGerandoPDF] = useState(false);

  function showToast(msg,tipo="ok") {
    setToast({msg,tipo}); setTimeout(()=>setToast(null),3500);
  }

  const especiaisKeys = useMemo(()=>{
    const k=[]; ESPECIAIS.forEach(e=>{for(let i=1;i<=e.count;i++)k.push(`${e.id}_${i}`);}); return k;
  },[]);
  const especiaisColadas = especiaisKeys.filter(k=>coladas.has(k)).length;

  const totalColadas = useMemo(()=>{
    let c=0; SELECOES.forEach(s=>{for(let i=1;i<=20;i++)if(coladas.has(`${s.id}_${i}`))c++;}); return c+especiaisColadas;
  },[coladas,especiaisColadas]);

  const totalRepetidas = useMemo(()=>Object.values(repetidas).reduce((a,v)=>a+v,0),[repetidas]);
  const pctGeral = Math.round((totalColadas/TOTAL_ALBUM)*100);

  const selecoesFiltradas = useMemo(()=>SELECOES.filter(s=>{
    if(filtroGrupo!=="todos"&&s.grupo!==filtroGrupo) return false;
    if(busca&&!s.nome.toLowerCase().includes(busca.toLowerCase())) return false;
    const c=[...Array(20)].filter((_,i)=>coladas.has(`${s.id}_${i+1}`)).length;
    if(filtroStatus==="faltando"&&c===20) return false;
    if(filtroStatus==="completas"&&c<20) return false;
    return true;
  }),[busca,filtroGrupo,filtroStatus,coladas]);

  const comRepetidas = useMemo(()=>{
    const r=[];
    SELECOES.forEach(s=>{
      const rps=[];
      for(let i=1;i<=20;i++){const k=`${s.id}_${i}`;if(repetidas[k]){const f=gerarFigurinhasSel(s)[i-1];rps.push({...f,key:k,rep:repetidas[k]});}}
      if(rps.length) r.push({sel:s,reps:rps});
    });
    return r;
  },[repetidas]);

  function copiarTrocas() {
    const l=["🔄 MINHAS REPETIDAS - Copa 2026 Panini\n"];
    comRepetidas.forEach(({sel,reps})=>{
      l.push(`${sel.bandeira} ${sel.nome}:`);
      reps.forEach(r=>l.push(`  #${r.num} ${r.label} (${r.rep}x)`));
    });
    navigator.clipboard.writeText(l.join("\n")).catch(()=>{});
    showToast("Lista copiada!");
  }

  async function handleGerarPDF() {
    setGerandoPDF(true);
    try {
      const doc = await gerarPDF(coladas, repetidas);
      const dt = new Date().toISOString().slice(0,10);
      doc.save(`figurinhas-copa2026-${dt}.pdf`);
      showToast("📄 PDF gerado com sucesso!");
    } catch(e) {
      showToast("Erro ao gerar PDF. Tente novamente.", "err");
    } finally {
      setGerandoPDF(false);
    }
  }

  function handleConfirm(resultado,acao) {
    const d=resultado.dados;
    const sel=SELECOES.find(s=>s.id===d.selecao_id);
    if(!sel) return;
    if(resultado.tipo==="pagina"&&acao==="colada") {
      const novas=(d.coladas||[]).filter(n=>!coladas.has(`${sel.id}_${n}`));
      marcarLote(novas.map(n=>`${sel.id}_${n}`),true);
      showToast(`✅ ${novas.length} figurinhas registradas para ${sel.nome}!`);
    }
    if(resultado.tipo==="verso") {
      const key=`${sel.id}_${d.numero}`;
      if(acao==="colada"){marcarLote([key],true);showToast(`✅ ${sel.nome} #${d.numero} registrada!`);}
      else if(acao==="repetida"){marcarLote([key],true);addRepetida(key);showToast(`🔁 ${sel.nome} #${d.numero} adicionada às trocas!`,"rep");}
    }
  }

  const grupos=["todos","A","B","C","D","E","F","G","H","I","J","K","L"];

  return (
    <div style={{background:"#080814",minHeight:"100vh",fontFamily:"'Inter','Segoe UI',sans-serif",color:"#e0e0e0"}}>

      {toast&&(
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",
          background:toast.tipo==="rep"?"#92400e":toast.tipo==="err"?"#7f1d1d":"#14532d",
          color:"#fff",padding:"12px 20px",borderRadius:12,fontSize:13,fontWeight:600,
          zIndex:2000,boxShadow:"0 4px 24px #0008",whiteSpace:"nowrap"}}>
          {toast.msg}
        </div>
      )}

      {cameraModal&&(
        <CameraModal modo={cameraModal} coladas={coladas} onClose={()=>setCameraModal(null)} onConfirm={handleConfirm}/>
      )}

      {/* HEADER */}
      <div style={{background:"linear-gradient(135deg,#0a0a1f,#12122a,#0a0a1f)",borderBottom:"1px solid #1e1e35",padding:"18px 16px 0"}}>
        <div style={{maxWidth:900,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
            <div style={{background:"linear-gradient(135deg,#e8c84a,#f5a623)",borderRadius:10,padding:"8px 12px",fontSize:20}}>🏆</div>
            <div>
              <div style={{fontSize:18,fontWeight:800}}>
                <span style={{color:"#e8c84a"}}>Copa 2026</span>
                <span style={{color:"#444",fontSize:12,fontWeight:400,marginLeft:8}}>Panini · 980 figurinhas</span>
              </div>
              <div style={{fontSize:11,color:"#444"}}>48 seleções · 12 grupos · EUA, Canadá e México</div>
            </div>
          </div>

          {/* Progresso */}
          <div style={{background:"#0f0f1f",borderRadius:12,padding:"12px 14px",marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
              <span style={{fontSize:12,color:"#888"}}>Progresso geral</span>
              <span style={{fontSize:20,fontWeight:800,color:"#e8c84a"}}>{pctGeral}%</span>
            </div>
            <ProgressBar pct={pctGeral} color="#e8c84a"/>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:8,fontSize:11}}>
              <span><span style={{color:"#4ade80",fontWeight:700}}>{totalColadas}</span> <span style={{color:"#444"}}>coladas</span></span>
              <span><span style={{color:"#f59e0b",fontWeight:700}}>{TOTAL_ALBUM-totalColadas}</span> <span style={{color:"#444"}}>faltando</span></span>
              <span><span style={{color:"#f97316",fontWeight:700}}>{totalRepetidas}</span> <span style={{color:"#444"}}>repetidas</span></span>
            </div>
          </div>

          {/* Botões de ação */}
          <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
            <button onClick={()=>setCameraModal("pagina")} style={{flex:1,minWidth:100,background:"linear-gradient(135deg,#1e3a5f,#1e4a7f)",border:"1px solid #2a5a9f",borderRadius:10,color:"#7dd3fc",padding:"10px 8px",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
              <span style={{fontSize:15}}>📖</span> Escanear Página
            </button>
            <button onClick={()=>setCameraModal("verso")} style={{flex:1,minWidth:100,background:"linear-gradient(135deg,#3a1e5f,#5a1e7f)",border:"1px solid #7a2aaf",borderRadius:10,color:"#c4b5fd",padding:"10px 8px",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
              <span style={{fontSize:15}}>🔍</span> Ler Figurinha
            </button>
            <button onClick={handleGerarPDF} disabled={gerandoPDF} style={{flex:1,minWidth:100,background:gerandoPDF?"#1a1a2a":"linear-gradient(135deg,#1a2a1a,#14532d)",border:`1px solid ${gerandoPDF?"#333":"#166534"}`,borderRadius:10,color:gerandoPDF?"#555":"#4ade80",padding:"10px 8px",fontSize:12,fontWeight:700,cursor:gerandoPDF?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5,transition:"all 0.2s"}}>
              <span style={{fontSize:15}}>{gerandoPDF?"⏳":"📄"}</span>
              {gerandoPDF?"Gerando...":"Exportar PDF"}
            </button>
          </div>

          {/* Abas */}
          <div style={{display:"flex",gap:2}}>
            {[{key:"album",label:"🗂 Álbum"},{key:"resumo",label:"📊 Resumo"},{key:"trocas",label:"🔄 Trocas"}].map(a=>(
              <button key={a.key} onClick={()=>setAba(a.key)} style={{background:aba===a.key?"#1e1e35":"transparent",border:"none",borderBottom:aba===a.key?"2px solid #e8c84a":"2px solid transparent",color:aba===a.key?"#e8c84a":"#555",padding:"9px 14px",cursor:"pointer",fontSize:12,fontWeight:600,borderRadius:"8px 8px 0 0",transition:"all 0.15s"}}>{a.label}</button>
            ))}
          </div>
        </div>
      </div>

      {/* CONTENT */}
      <div style={{maxWidth:900,margin:"0 auto",padding:"16px"}}>

        {/* ABA ÁLBUM */}
        {aba==="album"&&(
          <>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
              <input placeholder="🔍 Buscar seleção..." value={busca} onChange={e=>setBusca(e.target.value)} style={{flex:1,minWidth:140,background:"#0f0f1f",border:"1px solid #2a2a40",borderRadius:8,padding:"8px 12px",color:"#e0e0e0",fontSize:13,outline:"none"}}/>
              <select value={filtroGrupo} onChange={e=>setFiltroGrupo(e.target.value)} style={{background:"#0f0f1f",border:"1px solid #2a2a40",borderRadius:8,color:"#e0e0e0",padding:"8px 10px",fontSize:12,cursor:"pointer"}}>
                {grupos.map(g=><option key={g} value={g}>{g==="todos"?"Todos grupos":`Grupo ${g}`}</option>)}
              </select>
              <select value={filtroStatus} onChange={e=>setFiltroStatus(e.target.value)} style={{background:"#0f0f1f",border:"1px solid #2a2a40",borderRadius:8,color:"#e0e0e0",padding:"8px 10px",fontSize:12,cursor:"pointer"}}>
                <option value="todos">Todas</option>
                <option value="faltando">Com falta</option>
                <option value="completas">Completas</option>
              </select>
            </div>

            {/* Especiais */}
            <div style={{background:"#0d0d1f",borderRadius:12,padding:14,marginBottom:14,border:"1px solid #2a1a00"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                <span style={{color:"#e8c84a",fontWeight:700,fontSize:13}}>⭐ Especiais</span>
                <span style={{fontSize:11,color:"#666"}}>{especiaisColadas}/{especiaisKeys.length}</span>
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {ESPECIAIS.map(e=>[...Array(e.count)].map((_,i)=>{
                  const k=`${e.id}_${i+1}`;const ok=coladas.has(k);
                  return(<button key={k} onClick={()=>toggle(k)} style={{background:ok?"#0e2a0e":"#0f0f1f",border:`1.5px solid ${ok?"#4ade80":"#e8c84a44"}`,borderRadius:8,padding:"5px 9px",cursor:"pointer",color:ok?"#4ade80":"#e8c84a",fontSize:10,fontWeight:600,transition:"all 0.15s"}}>{ok?"✓ ":""}{e.count===1?e.label:`${e.label.replace(/ .*/,"")} ${i+1}`}</button>);
                }))}
              </div>
            </div>

            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {selecoesFiltradas.length===0&&<div style={{textAlign:"center",color:"#333",padding:40,fontSize:13}}>Nenhuma seleção encontrada</div>}
              {selecoesFiltradas.map(sel=>(
                <SelecaoCard key={sel.id} sel={sel} coladas={coladas} repetidas={repetidas} toggle={toggle} setRep={setRep} expandida={expandida===sel.id} onClick={()=>setExpandida(expandida===sel.id?null:sel.id)}/>
              ))}
            </div>
          </>
        )}

        {/* ABA RESUMO */}
        {aba==="resumo"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:16}}>
              {[
                {label:"Coladas",val:totalColadas,color:"#4ade80",icon:"✅"},
                {label:"Faltando",val:TOTAL_ALBUM-totalColadas,color:"#f59e0b",icon:"🔲"},
                {label:"Repetidas",val:totalRepetidas,color:"#f97316",icon:"🔁"},
                {label:"Custo est. faltando",val:`R$${Math.ceil((TOTAL_ALBUM-totalColadas)/7)*7}`,color:"#a78bfa",icon:"💰"},
              ].map((s,i)=>(
                <div key={i} style={{background:"#0d0d1f",borderRadius:12,padding:14,border:"1px solid #1e1e35",textAlign:"center"}}>
                  <div style={{fontSize:22,marginBottom:4}}>{s.icon}</div>
                  <div style={{fontSize:20,fontWeight:800,color:s.color}}>{s.val}</div>
                  <div style={{fontSize:10,color:"#444",marginTop:3}}>{s.label}</div>
                </div>
              ))}
            </div>

            {/* Botão PDF no resumo também */}
            <button onClick={handleGerarPDF} disabled={gerandoPDF} style={{width:"100%",background:gerandoPDF?"#1a1a2a":"linear-gradient(135deg,#0a2a0a,#14532d)",border:`1px solid ${gerandoPDF?"#333":"#166534"}`,borderRadius:10,color:gerandoPDF?"#555":"#4ade80",padding:"13px",fontSize:13,fontWeight:700,cursor:gerandoPDF?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:14,transition:"all 0.2s"}}>
              <span style={{fontSize:18}}>{gerandoPDF?"⏳":"📄"}</span>
              {gerandoPDF?"Gerando PDF A4...":"Baixar PDF A4 — Minhas Figurinhas"}
            </button>

            <div style={{background:"#0d0d1f",borderRadius:12,padding:14,border:"1px solid #1e1e35"}}>
              <div style={{fontSize:13,fontWeight:700,color:"#e0e0e0",marginBottom:12}}>Progresso por Grupo</div>
              {["A","B","C","D","E","F","G","H","I","J","K","L"].map(g=>{
                const sels=SELECOES.filter(s=>s.grupo===g);
                const tot=sels.length*20;
                const c=sels.reduce((acc,s)=>{for(let i=1;i<=20;i++)if(coladas.has(`${s.id}_${i}`))acc++;return acc;},0);
                const pct=Math.round((c/tot)*100);
                return(
                  <div key={g} style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                      <span style={{fontSize:11,color:"#888"}}>Grupo {g} · {sels.map(s=>s.bandeira).join(" ")}</span>
                      <span style={{fontSize:11,color:"#e8c84a"}}>{c}/{tot}</span>
                    </div>
                    <ProgressBar pct={pct} color="#e8c84a"/>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ABA TROCAS */}
        {aba==="trocas"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div>
                <div style={{fontSize:14,fontWeight:700}}>Figurinhas para trocar</div>
                <div style={{fontSize:11,color:"#555"}}>{totalRepetidas} repetidas</div>
              </div>
              <button onClick={copiarTrocas} style={{background:"#1e1e35",border:"1px solid #3a3a60",borderRadius:8,color:"#e8c84a",padding:"8px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>📋 Copiar</button>
            </div>
            {comRepetidas.length===0?(
              <div style={{textAlign:"center",color:"#333",padding:60,fontSize:13}}>
                <div style={{fontSize:32,marginBottom:10}}>🔁</div>
                Nenhuma repetida ainda.
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {comRepetidas.map(({sel,reps})=>(
                  <div key={sel.id} style={{background:"#0d0d1f",borderRadius:12,padding:13,border:"1px solid #1e1e35"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}>
                      <span style={{fontSize:18}}>{sel.bandeira}</span>
                      <span style={{fontWeight:700,fontSize:13}}>{sel.nome}</span>
                      <Badge color="#78350f">{reps.reduce((a,r)=>a+r.rep,0)} rep</Badge>
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                      {reps.map(r=>(
                        <div key={r.key} style={{background:"#1a1200",border:"1px solid #78350f",borderRadius:6,padding:"3px 8px",fontSize:10}}>
                          <span style={{color:"#f59e0b"}}>#{r.num}</span>
                          <span style={{color:"#888",marginLeft:4}}>{r.label}</span>
                          <span style={{color:"#f97316",marginLeft:5,fontWeight:700}}>×{r.rep}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>

      <div style={{textAlign:"center",padding:"16px 0 28px",color:"#222",fontSize:10}}>
        Copa 2026 · Panini · 980 figurinhas · 48 seleções
      </div>
    </div>
  );
}


// Monta o app
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
